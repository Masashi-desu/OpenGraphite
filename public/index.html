<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenGraphite</title>
    <link rel="stylesheet" href="../CSS/OpenGraphite.css">
  </head>
  <body>
    <OpenGraphitePage
      data-og-id="page"
      data-og-type="page"
      data-og-layout="vertical"
      data-og-role="page-preview"
      style="
        --og-gap:72px;
        --og-padding:56px;
        --og-background:#f5f7f7;
        --og-foreground:#1b2026;
      ">
      <HeroSection
        data-og-id="hero"
        data-og-type="frame"
        data-og-layout="horizontal"
        data-og-role="landing-hero"
        style="
          --og-gap:44px;
          --og-padding:64px;
          --og-radius:28px;
          --og-background:linear-gradient(135deg,#ffffff 0%,#e9fbf5 54%,#fff3d6 100%);
          --og-align:center;
        ">
        <HeroCopy
          data-og-id="hero-copy"
          data-og-type="frame"
          data-og-layout="vertical"
          style="
            --og-gap:24px;
            --og-width:min(100%,560px);
          ">
          <EyebrowText
            data-og-id="eyebrow"
            data-og-type="text"
            data-og-role="eyebrow">
            HTML-first design editor
          </EyebrowText>
          <MainTitle
            data-og-id="title"
            data-og-type="text"
            style="
              --og-font-size:72px;
              --og-font-weight:780;
              --og-line-height:.95;
              --og-letter-spacing:0;
            ">
            OpenGraphite
          </MainTitle>
          <LeadText
            data-og-id="lead"
            data-og-type="text"
            data-og-role="muted"
            style="
              --og-font-size:21px;
              --og-line-height:1.6;
              --og-max-width:520px;
            ">
            編集した内容をHTMLへ直接反映し、そのHTMLをそのままWeb成果物として配布できるデザインアプリです。
          </LeadText>
          <ActionRow
            data-og-id="hero-actions"
            data-og-type="frame"
            data-og-layout="horizontal"
            style="
              --og-gap:12px;
              --og-align:center;
            ">
            <PrimaryButton
              data-og-id="primary-action"
              data-og-type="button"
              data-og-role="primary-button"
              style="
                --og-padding:14px 20px;
                --og-radius:10px;
                --og-background:#0f9f8f;
              ">
              Open Sample
            </PrimaryButton>
            <SecondaryButton
              data-og-id="secondary-action"
              data-og-type="button"
              data-og-role="secondary-button"
              style="
                --og-padding:14px 20px;
                --og-radius:10px;
              ">
              Read README
            </SecondaryButton>
          </ActionRow>
        </HeroCopy>

        <EditorPreview
          data-og-id="editor-preview"
          data-og-type="image"
          data-og-role="card"
          style="
            --og-width:min(100%,620px);
            --og-height:420px;
            --og-radius:22px;
            --og-padding:0;
          ">
          <img src="./assets/editor-preview.svg" alt="OpenGraphite editor preview">
        </EditorPreview>
      </HeroSection>

      <PrinciplesSection
        data-og-id="principles"
        data-og-type="frame"
        data-og-layout="horizontal"
        style="
          --og-gap:20px;
          --og-align:stretch;
        ">
        <PrincipleCard
          data-og-id="principle-html"
          data-og-type="frame"
          data-og-layout="vertical"
          data-og-role="card"
          style="
            --og-gap:14px;
            --og-padding:28px;
            --og-radius:18px;
            --og-flex:1 1 0;
          ">
          <CardTitle
            data-og-id="principle-html-title"
            data-og-type="text"
            style="
              --og-font-size:24px;
              --og-font-weight:720;
            ">
            HTMLが正本
          </CardTitle>
          <CardText
            data-og-id="principle-html-text"
            data-og-type="text"
            data-og-role="muted"
            style="--og-line-height:1.6;">
            .ogpは管理情報を持ち、public内のHTMLが実際の成果物として残ります。
          </CardText>
        </PrincipleCard>

        <PrincipleCard
          data-og-id="principle-data"
          data-og-type="frame"
          data-og-layout="vertical"
          data-og-role="card"
          style="
            --og-gap:14px;
            --og-padding:28px;
            --og-radius:18px;
            --og-flex:1 1 0;
          ">
          <CardTitle
            data-og-id="principle-data-title"
            data-og-type="text"
            style="
              --og-font-size:24px;
              --og-font-weight:720;
            ">
            data-og-*で編集情報
          </CardTitle>
          <CardText
            data-og-id="principle-data-text"
            data-og-type="text"
            data-og-role="muted"
            style="--og-line-height:1.6;">
            ノードID、種類、レイアウト、役割をHTML上に保持し、LayersとInspectorへ反映します。
          </CardText>
        </PrincipleCard>

        <PrincipleCard
          data-og-id="principle-css"
          data-og-type="frame"
          data-og-layout="vertical"
          data-og-role="card"
          style="
            --og-gap:14px;
            --og-padding:28px;
            --og-radius:18px;
            --og-flex:1 1 0;
          ">
          <CardTitle
            data-og-id="principle-css-title"
            data-og-type="text"
            style="
              --og-font-size:24px;
              --og-font-weight:720;
            ">
            CSS変数がデザイン値
          </CardTitle>
          <CardText
            data-og-id="principle-css-text"
            data-og-type="text"
            data-og-role="muted"
            style="--og-line-height:1.6;">
            gap、padding、radius、色などの値をOpenGraphite.cssが解釈して描画します。
          </CardText>
        </PrincipleCard>
      </PrinciplesSection>
    </OpenGraphitePage>
  </body>
</html>

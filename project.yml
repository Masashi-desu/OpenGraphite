name: OpenGraphite
options:
  bundleIdPrefix: dev.opengraphite
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
packages:
  LucideIcons:
    url: https://github.com/JakubMazur/lucide-icons-swift.git
    from: "1.17.0"
targets:
  OpenGraphite:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: OpenGraphite
        CFBundleIconFile: OpenGraphite
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.graphics-design
        NSHumanReadableCopyright: "Copyright © 2026 OpenGraphite"
    sources:
      - path: App/Sources
      - path: Shared/Sources
      - path: App/Resources
        optional: true
        buildPhase: resources
        excludes:
          - AppIcon/OpenGraphite.icon
          - Info.plist
      - path: CSS
        type: folder
        buildPhase: resources
      - path: public
        type: folder
        buildPhase: resources
      - path: SampleProject
        type: folder
        buildPhase: resources
    dependencies:
      - sdk: WebKit.framework
      - package: LucideIcons
    settings:
      base:
        PRODUCT_NAME: OpenGraphite
        PRODUCT_BUNDLE_IDENTIFIER: dev.opengraphite.OpenGraphite
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
  ogkiln:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App/Sources/Domain
      - path: App/Sources/Infrastructure/ProjectLoader.swift
      - path: Shared/Sources
      - path: Tools/ogkiln
    dependencies:
      - sdk: AppKit.framework
      - sdk: WebKit.framework
    settings:
      base:
        PRODUCT_NAME: ogkiln
        PRODUCT_BUNDLE_IDENTIFIER: dev.opengraphite.ogkiln
  OpenGraphiteTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/OpenGraphiteTests
    dependencies:
      - target: OpenGraphite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.opengraphite.OpenGraphiteTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenGraphite.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OpenGraphite"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  OpenGraphite:
    build:
      targets:
        OpenGraphite: all
        OpenGraphiteTests: [test]
    run:
      config: Debug
      environmentVariables:
        OPENGRAPHITE_SAMPLE_PROJECT_PATH: "$(PROJECT_DIR)/SampleProject/OpenGraphiteSample.ogp"
    test:
      config: Debug
      targets:
        - OpenGraphiteTests
  ogkiln:
    build:
      targets:
        ogkiln: all
    run:
      config: Debug
